services:
  postgres:
    image: postgres:16
    container_name: myperson-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Sem ports expostas — acesso apenas via rede interna Docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - myperson-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: myperson-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-MyPerson.Api}
      Jwt__Audience: ${JWT_AUDIENCE:-MyPerson}
      Auth__AdminUser: ${AUTH_ADMIN_USER}
      Auth__AdminPassword: ${AUTH_ADMIN_PASSWORD}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_FRONTEND:-https://seudominio.com}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_ADMIN:-https://admin.seudominio.com}
    expose:
      - "5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - myperson-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: myperson-frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      api:
        condition: service_healthy
    networks:
      - myperson-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.prod
    container_name: myperson-admin
    expose:
      - "4200"
    networks:
      - myperson-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4200/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    build: ./nginx
    container_name: myperson-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
      admin:
        condition: service_healthy
    networks:
      - myperson-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:

networks:
  myperson-network:
    driver: bridge
