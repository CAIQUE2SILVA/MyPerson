services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:16
    container_name: myperson-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myperson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myperson123}
      POSTGRES_DB: ${POSTGRES_DB:-myperson}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - myperson-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myperson}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # API ASP.NET Core
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: myperson-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-myperson};Username=${POSTGRES_USER:-myperson};Password=${POSTGRES_PASSWORD:-myperson123}
    expose:
      - "5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - myperson-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myperson-frontend
    volumes:
      # Montar código fonte para hot reload
      - ./frontend:/app
      # Manter node_modules no container (não sobrescrever)
      - /app/node_modules
      # Manter .next no container
      - /app/.next
    expose:
      - "3000"
    depends_on:
      - api
    command: sh -c "npm install && npm run dev" # Instala dependências e inicia o servidor de desenvolvimento
    networks:
      - myperson-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Variável de ambiente para Next.js detectar mudanças
    environment:
      - WATCHPACK_POLLING=true

  # Admin Angular
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: myperson-admin
    volumes:
      - ./admin:/app
      - /app/node_modules
    expose:
      - "4200"
    networks:
      - myperson-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4200/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Nginx Reverse Proxy
  nginx:
    build: ./nginx
    container_name: myperson-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      # api:
      #   condition: service_healthy
      # frontend:
      #   condition: service_healthy
      admin:
        condition: service_healthy
    networks:
      - myperson-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:

networks:
  myperson-network:
    driver: bridge
